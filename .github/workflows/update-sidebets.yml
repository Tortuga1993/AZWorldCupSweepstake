name: Update Side Bets

on:
  schedule:
    - cron: '*/30 8-23 * * *'
  workflow_dispatch:

jobs:
  update-sidebets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run update script
        env:
          HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
        run: node scripts/update-sidebets.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sidebets.json
          git diff --staged --quiet || git commit -m "chore: auto-update side bets [skip ci]"
          git push
