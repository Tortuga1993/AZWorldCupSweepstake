name: Update scores

on:
  # PAUSED for demo data: the scheduled auto-update is disabled so the sample
  # matches/scorers in data/ stay put. Re-enable before the tournament by
  # uncommenting the schedule below (it overwrites the demo with live data).
  # schedule:
  #   - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Allow the job to push the refreshed data/matches.json back to the repo.
permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-scores.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/matches.json data/scorers.json)" ]]; then
            git config user.name "scores-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/matches.json data/scorers.json
            git commit -m "chore: update scores ($(date -u +%FT%TZ))"
            git push
          else
            echo "No score changes to commit."
          fi
